<div class="content" style="max-width:760px;padding-top:2.5rem">
  <a href="videos.html" class="back-link">← 回影片筆記</a>
  <div id="detail">
    <div class="empty-state">載入中…</div>
  </div>
</div>

<footer>道館規定：面・小手・胴 only（無突き）</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js?v=20260719p"></script>
<script>
var fb = KENDO.init();
var db = fb.db;
var detailEl = document.getElementById('detail');

var key = new URLSearchParams(location.search).get('id');
var player = null;
var playerReady = false;

if (!key){
  detailEl.innerHTML = '<div class="empty-state">找不到這篇筆記。<br><a href="videos.html">回影片筆記 →</a></div>';
} else {
  db.ref('videos/' + key).on('value', function(snap){
    var v = snap.val();
    if (!v){
      detailEl.innerHTML = '<div class="empty-state">找不到這篇筆記，可能已被刪除。<br><a href="videos.html">回影片筆記 →</a></div>';
      return;
    }
    renderDetail({
      date: v.date || '',
      title: v.title || '',
      url: v.url || '',
      text: v.text || '',
      tags: KENDO.normTags(v.tags)
    });
  }, function(err){
    detailEl.innerHTML = '<div class="empty-state">載入失敗：' + err.message +
      '<br><span style="font-size:12px">（如果是權限問題，請確認 Firebase 規則的 videos 有 ".read": true）</span></div>';
  });
}

/* 時間戳記點下去 → 控制頁面上的播放器，不跳走 */
function seekTo(seconds){
  if (player && playerReady){
    player.seekTo(seconds, true);
    player.playVideo();
    document.querySelector('.video-embed').scrollIntoView({behavior:'smooth', block:'center'});
  }
}

function linkifyLocal(text, hasPlayer){
  var frag = document.createDocumentFragment();
  var src = String(text || '').replace(/<br\s*\/?>/gi, '\n');
  var re = /(?:^|[^\d:])(\d{1,2}:\d{2}(?::\d{2})?)(?![\d:])/g;
  var last = 0, m;
  while ((m = re.exec(src)) !== null){
    var ts = m[1];
    var start = m.index + m[0].length - ts.length;
    if (start > last) frag.appendChild(document.createTextNode(src.slice(last, start)));

    if (hasPlayer){
      var b = document.createElement('button');
      b.className = 'ts-link';
      b.style.cssText = 'background:none;padding:0 0 1px;cursor:pointer';
      b.textContent = ts;
      b.title = '跳到 ' + ts;
      (function(sec){ b.onclick = function(){ seekTo(sec); }; })(KENDO.tsToSeconds(ts));
      frag.appendChild(b);
    } else {
      frag.appendChild(document.createTextNode(ts));
    }
    last = start + ts.length;
  }
  if (last < src.length) frag.appendChild(document.createTextNode(src.slice(last)));
  return frag;
}

function renderDetail(e){
  var id = KENDO.ytId(e.url);
  document.title = (e.title || '影片筆記') + ' — 劍道學習手冊';
  detailEl.innerHTML = '';

  if (id){
    var box = document.createElement('div');
    box.className = 'video-embed';
    var iframe = document.createElement('iframe');
    iframe.id = 'yt-player';
    iframe.src = 'https://www.youtube-nocookie.com/embed/' + id + '?enablejsapi=1&rel=0';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.title = e.title || '影片';
    box.appendChild(iframe);
    detailEl.appendChild(box);
    loadYT(id);
  }

  var d = document.createElement('div');
  d.className = 'detail-date';
  d.textContent = e.date;
  detailEl.appendChild(d);

  var h = document.createElement('h1');
  h.className = 'detail-title';
  h.textContent = e.title || '(無標題)';
  detailEl.appendChild(h);

  if (e.tags.length){
    var tw = document.createElement('div');
    tw.className = 'entry-tags';
    e.tags.forEach(function(t){
      var a = document.createElement('a');
      a.className = 'entry-tag';
      a.href = KENDO.tagUrl(t);
      a.style.textDecoration = 'none';
      a.textContent = '#' + t;
      tw.appendChild(a);
    });
    detailEl.appendChild(tw);
  }

  var body = document.createElement('div');
  body.className = 'detail-body';
  body.appendChild(linkifyLocal(e.text, !!id));
  detailEl.appendChild(body);

  if (id){
    var hint = document.createElement('div');
    hint.className = 'ts-hint';
    hint.textContent = '點筆記裡的時間，上面的影片會直接跳到那一段。';
    detailEl.appendChild(hint);
  }

  var foot = document.createElement('div');
  foot.className = 'detail-foot';

  var back = document.createElement('a');
  back.href = 'videos.html';
  back.textContent = '← 回影片筆記';
  foot.appendChild(back);

  if (e.url){
    var ext = document.createElement('a');
    ext.href = e.url;
    ext.target = '_blank';
    ext.rel = 'noopener noreferrer';
    ext.textContent = '在 YouTube 開啟 ↗';
    foot.appendChild(ext);
  }
  detailEl.appendChild(foot);
}

/* YouTube IFrame API */
function loadYT(){
  if (window.YT && window.YT.Player){ initPlayer(); return; }
  if (document.getElementById('yt-api')) return;
  var s = document.createElement('script');
  s.id = 'yt-api';
  s.src = 'https://www.youtube.com/iframe_api';
  document.body.appendChild(s);
}
function initPlayer(){
  player = new YT.Player('yt-player', {
    events: { onReady: function(){ playerReady = true; } }
  });
}
window.onYouTubeIframeAPIReady = function(){ initPlayer(); };
</script>
</body>
</html>
