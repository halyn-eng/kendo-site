<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影片筆記 — 劍道學習手冊</title>
<link rel="stylesheet" href="style.css?v=20260719p">
<style>
.auth-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:1rem}
.auth-bar button{padding:6px 16px;font-size:13px}
#login-form{max-width:320px;margin-left:auto;margin-bottom:1.5rem}
.note-btn{font-size:11.5px;padding:3px 11px;border-radius:2px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-family:inherit;cursor:pointer;transition:background .18s,color .18s,border-color .18s}
.note-btn:hover{background:var(--line-soft);color:var(--ink);border-color:var(--ink-faint)}
.note-btn.delete:hover{color:var(--accent);border-color:var(--accent)}
.field-hint{font-size:11.5px;color:var(--ink-faint);margin:-4px 0 2px}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="brand-icon">⚔</span>劍道學習手冊</a>
    <ul class="navbar-links">
      <li><a href="terms.html">基礎知識</a></li>
      <li><a href="reading.html">読み練習</a></li>
      <li><a href="errors.html">常見錯誤</a></li>
      <li><a href="daily.html">每日練習</a></li>
      <li><a href="notes.html">練習心得</a></li>
      <li><a href="videos.html" class="active">影片筆記</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="terms.html">基礎知識</a>
    <a href="reading.html">読み練習</a>
    <a href="errors.html">常見錯誤</a>
    <a href="daily.html">每日練習</a>
    <a href="notes.html">練習心得</a>
    <a href="videos.html" class="active">影片筆記</a>
  </div>
</nav>

<div class="page-header">
  <h1>影片筆記</h1>
  <p>看日本劍道 YouTube 影片，消化後寫成自己的中文重點</p>
</div>

<div class="content">

  <div class="auth-bar">
    <button id="login-btn" class="btn-save">登入</button>
    <button id="logout-btn" class="btn-save" style="display:none">登出</button>
  </div>

  <form id="login-form" class="notes-form" style="display:none">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-pw" placeholder="密碼" required>
    <button id="login-submit" class="btn-save" type="submit">送出登入</button>
  </form>

  <form id="add-form" class="notes-form" style="display:none">
    <input type="date" id="f-date" required>
    <input type="text" id="f-title" placeholder="影片標題（自己下的中文標題）" required>
    <input type="url" id="f-url" placeholder="YouTube 連結（https://youtu.be/...）">
    <input type="text" id="f-tags" placeholder="標籤，例：返し胴 踏み込み 中段">
    <div class="field-hint">標籤用空白或逗號分隔，不用打 #</div>
    <textarea id="f-text" placeholder="用自己的話寫重點筆記，不用逐字翻譯&#10;&#10;寫 3:20 這種時間，發布後會自動變成可以點的連結，直接跳到影片那一秒" required></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button type="button" id="cancel-btn" class="note-btn" style="display:none">取消編輯</button>
      <button id="submit-btn" class="btn-save" type="submit">發布筆記</button>
    </div>
  </form>

  <div class="filter-bar">
    <div class="filter-row">
      <input type="text" id="search" class="search-input" placeholder="搜尋標題或筆記內容…">
      <span class="filter-count" id="count"></span>
      <a href="tags.html" class="tag-chip" style="text-decoration:none">標籤總覽 →</a>
    </div>
    <div class="tag-chips" id="tag-chips"></div>
  </div>

  <div class="video-grid" id="list">
    <div class="empty-state" style="grid-column:1/-1">載入中…</div>
  </div>

</div>

<footer>道館規定：面・小手・胴 only（無突き）</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js?v=20260719p"></script>
<script>
const fb = KENDO.init();
const auth = fb.auth;
const db = fb.db;
const ADMIN_UID = KENDO.ADMIN_UID;
const ref = db.ref('videos');

const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const loginForm = document.getElementById('login-form');
const addForm = document.getElementById('add-form');
const cancelBtn = document.getElementById('cancel-btn');
const submitBtn = document.getElementById('submit-btn');
const listEl = document.getElementById('list');
const chipsEl = document.getElementById('tag-chips');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');

let entries = [];
let editingKey = null;
let activeTag = null;
let query = '';

/* ---------- helpers（共用邏輯在 app.js） ---------- */
var ytId = KENDO.ytId, formatDate = KENDO.formatDate,
    toISODate = KENDO.toISODate, parseTags = KENDO.parseTags;

/* ---------- form ---------- */
function resetForm(){
  addForm.reset();
  editingKey = null;
  submitBtn.textContent = '發布筆記';
  cancelBtn.style.display = 'none';
}
function startEdit(e){
  editingKey = e.key;
  document.getElementById('f-date').value = toISODate(e.date);
  document.getElementById('f-title').value = e.title || '';
  document.getElementById('f-url').value = e.url || '';
  document.getElementById('f-tags').value = (e.tags || []).join(' ');
  document.getElementById('f-text').value = e.text || '';
  submitBtn.textContent = '更新筆記';
  cancelBtn.style.display = 'inline-block';
  addForm.scrollIntoView({behavior:'smooth'});
}
cancelBtn.onclick = function(){ resetForm(); };

/* ---------- render ---------- */
function renderChips(){
  var counts = {};
  entries.forEach(function(e){
    (e.tags||[]).forEach(function(t){ counts[t] = (counts[t]||0) + 1; });
  });
  var tags = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a] || a.localeCompare(b); });
  chipsEl.innerHTML = '';
  if (!tags.length) return;

  var all = document.createElement('button');
  all.className = 'tag-chip' + (activeTag === null ? ' active' : '');
  all.textContent = '全部';
  all.onclick = function(){ activeTag = null; render(); };
  chipsEl.appendChild(all);

  tags.forEach(function(t){
    var b = document.createElement('button');
    b.className = 'tag-chip' + (activeTag === t ? ' active' : '');
    b.textContent = '#' + t + ' ' + counts[t];
    b.onclick = function(){ activeTag = (activeTag === t ? null : t); render(); };
    chipsEl.appendChild(b);
  });
}

function render(){
  var isAdmin = auth.currentUser && auth.currentUser.uid === ADMIN_UID;
  renderChips();

  var shown = entries.filter(function(e){
    if (activeTag && (e.tags||[]).indexOf(activeTag) === -1) return false;
    if (query){
      var hay = ((e.title||'') + ' ' + (e.text||'') + ' ' + (e.tags||[]).join(' ')).toLowerCase();
      if (hay.indexOf(query) === -1) return false;
    }
    return true;
  });

  countEl.textContent = shown.length + ' / ' + entries.length + ' 篇';
  listEl.innerHTML = '';

  if (!shown.length){
    var msg = entries.length ? '沒有符合條件的筆記。' : '還沒有影片筆記。';
    listEl.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' + msg + '</div>';
    return;
  }

  shown.forEach(function(e){
    var card = document.createElement('div');
    card.className = 'video-card';

    var detailUrl = 'video.html?id=' + encodeURIComponent(e.key);

    var id = ytId(e.url);
    if (id){
      var a = document.createElement('a');
      a.className = 'video-thumb';
      a.href = detailUrl;
      a.style.backgroundImage = "url('https://i.ytimg.com/vi/" + id + "/hqdefault.jpg')";
      card.appendChild(a);
    }

    var body = document.createElement('div');
    body.className = 'video-body';

    var d = document.createElement('div');
    d.className = 'video-date';
    d.textContent = e.date || '';
    body.appendChild(d);

    var title = document.createElement('a');
    title.href = detailUrl;
    title.className = 'video-title';
    title.textContent = e.title || '(無標題)';
    body.appendChild(title);

    var note = document.createElement('div');
    note.className = 'video-note clamped';
    note.textContent = e.text || '';
    body.appendChild(note);

    var more = document.createElement('a');
    more.className = 'video-more';
    more.href = detailUrl;
    more.style.textDecoration = 'none';
    more.textContent = '看筆記全文 →';
    body.appendChild(more);

    if ((e.tags||[]).length){
      var tw = document.createElement('div');
      tw.className = 'entry-tags';
      e.tags.forEach(function(t){
        var b = document.createElement('button');
        b.className = 'entry-tag';
        b.textContent = '#' + t;
        b.onclick = function(){
          activeTag = (activeTag === t ? null : t);
          render();
          window.scrollTo({top:0,behavior:'smooth'});
        };
        tw.appendChild(b);
      });
      body.appendChild(tw);
    }

    if (isAdmin){
      var foot = document.createElement('div');
      foot.className = 'video-foot';

      var ed = document.createElement('button');
      ed.className = 'note-btn edit';
      ed.textContent = '編輯';
      ed.onclick = function(){ startEdit(e); };
      foot.appendChild(ed);

      var del = document.createElement('button');
      del.className = 'note-btn delete';
      del.textContent = '刪除';
      del.onclick = function(){ if (confirm('確定刪除這篇影片筆記？')) ref.child(e.key).remove(); };
      foot.appendChild(del);

      body.appendChild(foot);
    }

    card.appendChild(body);
    listEl.appendChild(card);
  });
}

/* ---------- data ---------- */
ref.on('value', function(snap){
  entries = [];
  snap.forEach(function(c){
    var v = c.val() || {};
    entries.push({
      key: c.key,
      date: v.date || '',
      title: v.title || '',
      url: v.url || '',
      text: v.text || '',
      tags: Array.isArray(v.tags) ? v.tags : (v.tags ? parseTags(v.tags) : []),
      timestamp: v.timestamp || 0
    });
  });
  entries.sort(function(a,b){ return (b.timestamp||0) - (a.timestamp||0); });
  render();
});

/* ---------- filter events ---------- */
searchEl.addEventListener('input', function(){
  query = searchEl.value.trim().toLowerCase();
  render();
});

/* ---------- auth ---------- */
loginBtn.onclick = function(){ loginForm.style.display = 'flex'; };

loginForm.addEventListener('submit', function(ev){
  ev.preventDefault();
  auth.signInWithEmailAndPassword(
    document.getElementById('login-email').value,
    document.getElementById('login-pw').value
  ).then(function(){ loginForm.reset(); })
   .catch(function(err){ alert('登入失敗：' + err.message); });
});

logoutBtn.onclick = function(){ auth.signOut(); };

auth.onAuthStateChanged(function(user){
  var isAdmin = user && user.uid === ADMIN_UID;
  loginForm.style.display = 'none';
  loginBtn.style.display = isAdmin ? 'none' : 'inline-block';
  logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
  addForm.style.display = isAdmin ? 'flex' : 'none';
  render();
});

/* ---------- submit ---------- */
addForm.addEventListener('submit', function(ev){
  ev.preventDefault();
  var dateVal = document.getElementById('f-date').value;
  var title = document.getElementById('f-title').value.trim();
  var url = document.getElementById('f-url').value.trim();
  var tags = parseTags(document.getElementById('f-tags').value);
  var text = document.getElementById('f-text').value.trim();
  if (!dateVal || !title || !text) return;

  var payload = { date: formatDate(dateVal), title: title, url: url, tags: tags, text: text };

  if (editingKey){
    ref.child(editingKey).update(payload)
      .then(resetForm)
      .catch(function(err){ alert('更新失敗：' + err.message); });
  } else {
    payload.timestamp = Date.now();
    ref.push(payload)
      .then(resetForm)
      .catch(function(err){ alert('發布失敗：' + err.message); });
  }
});
</script>
</body>
</html>
