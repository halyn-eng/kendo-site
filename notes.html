<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>練習心得 — 劍道學習手冊</title>
<link rel="stylesheet" href="style.css?v=20260719m">
<style>
.auth-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:1rem}
.auth-bar button{padding:6px 16px;font-size:13px}
#login-form{max-width:320px;margin-left:auto;margin-bottom:1.5rem}
.note-actions{display:flex;gap:6px}
.note-btn{font-size:11.5px;padding:3px 11px;border-radius:2px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-family:inherit;cursor:pointer;transition:background .18s,color .18s,border-color .18s}
.note-btn:hover{background:var(--line-soft);color:var(--ink);border-color:var(--ink-faint)}
.note-btn.delete:hover{color:var(--accent);border-color:var(--accent)}
.field-hint{font-size:11.5px;color:var(--ink-faint);margin:-4px 0 2px}
.month-head{font-family:var(--serif);font-size:12.5px;letter-spacing:.12em;color:var(--ink-faint);margin:2.2rem 0 .9rem;padding-bottom:.5rem;border-bottom:1px solid var(--line-soft)}
.month-head:first-child{margin-top:0}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="brand-icon">⚔</span>劍道學習手冊</a>
    <ul class="navbar-links">
      <li><a href="terms.html">基礎知識</a></li>
      <li><a href="reading.html">読み練習</a></li>
      <li><a href="errors.html">常見錯誤</a></li>
      <li><a href="daily.html">每日練習</a></li>
      <li><a href="notes.html" class="active">練習心得</a></li>
      <li><a href="videos.html">影片筆記</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="terms.html">基礎知識</a>
    <a href="reading.html">読み練習</a>
    <a href="errors.html">常見錯誤</a>
    <a href="daily.html">每日練習</a>
    <a href="notes.html" class="active">練習心得</a>
    <a href="videos.html">影片筆記</a>
  </div>
</nav>

<div class="page-header">
  <h1>練習心得</h1>
  <p>記錄每次稽古的收穫・問題・進步</p>
</div>

<div class="content">

  <div class="auth-bar">
    <button id="login-btn" class="btn-save">登入</button>
    <button id="logout-btn" class="btn-save" style="display:none">登出</button>
  </div>

  <form id="login-form" class="notes-form" style="display:none">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-pw" placeholder="密碼" required>
    <button id="login-submit" class="btn-save" type="submit">送出登入</button>
  </form>

  <form id="add-note-form" class="notes-form" style="display:none">
    <input type="date" id="note-date" required>
    <input type="text" id="note-tags" placeholder="標籤，例：返し胴 踏み込み 稽古">
    <div class="field-hint">標籤用空白或逗號分隔，不用打 #</div>
    <textarea id="note-text-input" placeholder="寫下今天的心得..." required></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button type="button" id="cancel-edit-btn" class="note-btn" style="display:none">取消編輯</button>
      <button id="note-submit" class="btn-save" type="submit">發布心得</button>
    </div>
  </form>

  <div class="filter-bar">
    <div class="filter-row">
      <input type="text" id="search" class="search-input" placeholder="搜尋心得內容…">
      <span class="filter-count" id="count"></span>
      <a href="tags.html" class="tag-chip" style="text-decoration:none">標籤總覽 →</a>
    </div>
    <div class="tag-chips" id="tag-chips"></div>
  </div>

  <div id="notes-list">
    <div class="empty-state">載入中…</div>
  </div>

</div>

<footer>道館規定：面・小手・胴 only（無突き）</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="app.js?v=20260719m"></script>
<script>
const fb = KENDO.init();
const auth = fb.auth;
const db = fb.db;
const ADMIN_UID = KENDO.ADMIN_UID;
const notesRef = db.ref('notes');

const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const loginForm = document.getElementById('login-form');
const addForm = document.getElementById('add-note-form');
const cancelEditBtn = document.getElementById('cancel-edit-btn');
const noteSubmitBtn = document.getElementById('note-submit');
const notesList = document.getElementById('notes-list');
const chipsEl = document.getElementById('tag-chips');
const searchEl = document.getElementById('search');
const countEl = document.getElementById('count');

let entries = [];
let editingKey = null;
let activeTag = null;
let query = '';

/* ---------- helpers（共用邏輯在 app.js） ---------- */
var formatDate = KENDO.formatDate, toISODate = KENDO.toISODate,
    parseTags = KENDO.parseTags, monthKey = KENDO.monthKey,
    stripHtml = KENDO.stripHtml;

/* ---------- form ---------- */
function resetForm(){
  addForm.reset();
  editingKey = null;
  noteSubmitBtn.textContent = '發布心得';
  cancelEditBtn.style.display = 'none';
}
function startEdit(e){
  editingKey = e.key;
  document.getElementById('note-date').value = toISODate(e.date);
  document.getElementById('note-tags').value = (e.tags||[]).join(' ');
  document.getElementById('note-text-input').value = stripHtml(e.text);
  noteSubmitBtn.textContent = '更新心得';
  cancelEditBtn.style.display = 'inline-block';
  addForm.scrollIntoView({behavior:'smooth'});
}
cancelEditBtn.onclick = function(){ resetForm(); };

/* ---------- render ---------- */
function renderChips(){
  var counts = {};
  entries.forEach(function(e){
    (e.tags||[]).forEach(function(t){ counts[t] = (counts[t]||0)+1; });
  });
  var tags = Object.keys(counts).sort(function(a,b){ return counts[b]-counts[a] || a.localeCompare(b); });
  chipsEl.innerHTML = '';
  if (!tags.length) return;

  var all = document.createElement('button');
  all.className = 'tag-chip' + (activeTag === null ? ' active' : '');
  all.textContent = '全部';
  all.onclick = function(){ activeTag = null; render(); };
  chipsEl.appendChild(all);

  tags.forEach(function(t){
    var b = document.createElement('button');
    b.className = 'tag-chip' + (activeTag === t ? ' active' : '');
    b.textContent = '#' + t + ' ' + counts[t];
    b.onclick = function(){ activeTag = (activeTag === t ? null : t); render(); };
    chipsEl.appendChild(b);
  });
}

function render(){
  var isAdmin = auth.currentUser && auth.currentUser.uid === ADMIN_UID;
  renderChips();

  var shown = entries.filter(function(e){
    if (activeTag && (e.tags||[]).indexOf(activeTag) === -1) return false;
    if (query){
      var hay = (stripHtml(e.text) + ' ' + (e.tags||[]).join(' ') + ' ' + (e.date||'')).toLowerCase();
      if (hay.indexOf(query) === -1) return false;
    }
    return true;
  });

  countEl.textContent = shown.length + ' / ' + entries.length + ' 篇';
  notesList.innerHTML = '';

  if (!shown.length){
    notesList.innerHTML = '<div class="empty-state">' + (entries.length ? '沒有符合條件的心得。' : '還沒有心得記錄。') + '</div>';
    return;
  }

  var currentMonth = null;
  shown.forEach(function(e){
    var mk = monthKey(e.date);
    if (mk !== currentMonth){
      currentMonth = mk;
      var mh = document.createElement('div');
      mh.className = 'month-head';
      mh.textContent = mk;
      notesList.appendChild(mh);
    }

    var entry = document.createElement('div');
    entry.className = 'note-entry';

    var meta = document.createElement('div');
    meta.className = 'note-meta';
    var dateSpan = document.createElement('span');
    dateSpan.textContent = e.date || '';
    meta.appendChild(dateSpan);

    if (isAdmin){
      var actions = document.createElement('div');
      actions.className = 'note-actions';

      var editBtn = document.createElement('button');
      editBtn.className = 'note-btn edit';
      editBtn.textContent = '編輯';
      editBtn.onclick = function(){ startEdit(e); };
      actions.appendChild(editBtn);

      var delBtn = document.createElement('button');
      delBtn.className = 'note-btn delete';
      delBtn.textContent = '刪除';
      delBtn.onclick = function(){ if (confirm('確定刪除這篇心得？')) notesRef.child(e.key).remove(); };
      actions.appendChild(delBtn);

      meta.appendChild(actions);
    }
    entry.appendChild(meta);

    var textDiv = document.createElement('div');
    textDiv.className = 'note-text';
    textDiv.innerHTML = e.text || '';
    entry.appendChild(textDiv);

    if ((e.tags||[]).length){
      var tw = document.createElement('div');
      tw.className = 'entry-tags';
      e.tags.forEach(function(t){
        var b = document.createElement('button');
        b.className = 'entry-tag';
        b.textContent = '#' + t;
        b.onclick = function(){
          activeTag = (activeTag === t ? null : t);
          render();
          window.scrollTo({top:0,behavior:'smooth'});
        };
        tw.appendChild(b);
      });
      entry.appendChild(tw);
    }

    notesList.appendChild(entry);
  });
}

/* ---------- data ---------- */
notesRef.on('value', function(snap){
  entries = [];
  snap.forEach(function(c){
    var v = c.val() || {};
    entries.push({
      key: c.key,
      date: v.date || '',
      text: v.text || '',
      tags: Array.isArray(v.tags) ? v.tags : (v.tags ? parseTags(v.tags) : []),
      timestamp: v.timestamp || 0
    });
  });
  entries.sort(function(a,b){ return (b.timestamp||0) - (a.timestamp||0); });
  render();
});

searchEl.addEventListener('input', function(){
  query = searchEl.value.trim().toLowerCase();
  render();
});

/* ---------- auth ---------- */
loginBtn.onclick = function(){ loginForm.style.display = 'flex'; };

loginForm.addEventListener('submit', function(ev){
  ev.preventDefault();
  auth.signInWithEmailAndPassword(
    document.getElementById('login-email').value,
    document.getElementById('login-pw').value
  ).then(function(){ loginForm.reset(); })
   .catch(function(err){ alert('登入失敗：' + err.message); });
});

logoutBtn.onclick = function(){ auth.signOut(); };

auth.onAuthStateChanged(function(user){
  var isAdmin = user && user.uid === ADMIN_UID;
  loginForm.style.display = 'none';
  loginBtn.style.display = isAdmin ? 'none' : 'inline-block';
  logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
  addForm.style.display = isAdmin ? 'flex' : 'none';
  render();
});

/* ---------- submit ---------- */
addForm.addEventListener('submit', function(ev){
  ev.preventDefault();
  var dateVal = document.getElementById('note-date').value;
  var tags = parseTags(document.getElementById('note-tags').value);
  var textVal = document.getElementById('note-text-input').value.trim();
  if (!dateVal || !textVal) return;

  var payload = {
    date: formatDate(dateVal),
    tags: tags,
    text: textVal.replace(/\n/g, '<br>')
  };

  if (editingKey){
    notesRef.child(editingKey).update(payload)
      .then(resetForm)
      .catch(function(err){ alert('更新失敗：' + err.message); });
  } else {
    payload.timestamp = Date.now();
    notesRef.push(payload)
      .then(resetForm)
      .catch(function(err){ alert('發布失敗：' + err.message); });
  }
});
</script>
</body>
</html>
