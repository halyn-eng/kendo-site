<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>練習心得 — 劍道學習手冊</title>
<link rel="stylesheet" href="style.css?v=20260719h">
<style>
.auth-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:1rem}
.auth-bar button{padding:6px 16px;font-size:13px}
#login-form{max-width:320px;margin-left:auto;margin-bottom:1.5rem}
.note-actions{display:flex;gap:6px}
.note-btn{font-size:11.5px;padding:3px 11px;border-radius:2px;border:1px solid var(--line);background:var(--paper-2);color:var(--ink-soft);font-family:inherit;cursor:pointer;transition:background .18s,color .18s,border-color .18s}
.note-btn:hover{background:var(--line-soft);color:var(--ink);border-color:var(--ink-faint)}
.note-btn.delete:hover{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand"><span class="brand-icon">⚔</span>劍道學習手冊</a>
    <ul class="navbar-links">
      <li><a href="terms.html">入門知識</a></li>
      <li><a href="reading.html">読み練習</a></li>
      <li><a href="errors.html">常見錯誤</a></li>
      <li><a href="daily.html">每日練習</a></li>
      <li><a href="notes.html" class="active">練習心得</a></li>
      <li><a href="videos.html">影片筆記</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="terms.html">入門知識</a>
    <a href="reading.html">読み練習</a>
    <a href="errors.html">常見錯誤</a>
    <a href="daily.html">每日練習</a>
    <a href="notes.html" class="active">練習心得</a>
    <a href="videos.html">影片筆記</a>
  </div>
</nav>

<div class="page-header">
  <h1>練習心得</h1>
  <p>記錄每次稽古的收穫・問題・進步</p>
</div>

<div class="content">

  <div class="auth-bar">
    <button id="login-btn" class="btn-save">登入</button>
    <button id="logout-btn" class="btn-save" style="display:none">登出</button>
  </div>

  <form id="login-form" class="notes-form" style="display:none">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-pw" placeholder="密碼" required>
    <button id="login-submit" class="btn-save" type="submit">送出登入</button>
  </form>

  <form id="add-note-form" class="notes-form" style="display:none">
    <input type="date" id="note-date" required>
    <textarea id="note-text-input" placeholder="寫下今天的心得..." required></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button type="button" id="cancel-edit-btn" class="note-btn" style="display:none">取消編輯</button>
      <button id="note-submit" class="btn-save" type="submit">發布心得</button>
    </div>
  </form>

  <div id="notes-list">
    <div style="text-align:center;color:var(--ink-faint);padding:3.5rem;font-size:13.5px">載入中...</div>
  </div>

</div>

<footer>道館規定：面・小手・胴 only（無突き）</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('open');}

const firebaseConfig = {
  apiKey: "AIzaSyABbUlUE4GXd-oOS5wGvE44QMTf5jHOoww",
  authDomain: "kendo-blog.firebaseapp.com",
  databaseURL: "https://kendo-blog-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kendo-blog",
  storageBucket: "kendo-blog.firebasestorage.app",
  messagingSenderId: "131957671333",
  appId: "1:131957671333:web:5477aaeafdc9765433544c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const ADMIN_UID = "aRf8E0FGuZYHAJTFtIA94HJPArF2";
const notesRef = db.ref('notes');

const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const loginForm = document.getElementById('login-form');
const addForm = document.getElementById('add-note-form');
const cancelEditBtn = document.getElementById('cancel-edit-btn');
const noteSubmitBtn = document.getElementById('note-submit');
const notesList = document.getElementById('notes-list');
let editingKey = null;

function formatDate(iso){
  const parts = iso.split('-');
  return parts[0] + '/' + parseInt(parts[1],10) + '/' + parseInt(parts[2],10);
}

function toISODate(display){
  const parts = (display||'').split('/');
  if (parts.length !== 3) return '';
  return parts[0] + '-' + String(parts[1]).padStart(2,'0') + '-' + String(parts[2]).padStart(2,'0');
}

function resetForm(){
  addForm.reset();
  editingKey = null;
  noteSubmitBtn.textContent = '發布心得';
  cancelEditBtn.style.display = 'none';
}

function startEdit(e){
  editingKey = e.key;
  document.getElementById('note-date').value = toISODate(e.date);
  document.getElementById('note-text-input').value = (e.text||'').replace(/<br\s*\/?>/gi, '\n');
  noteSubmitBtn.textContent = '更新心得';
  cancelEditBtn.style.display = 'inline-block';
  addForm.scrollIntoView({behavior:'smooth'});
}

cancelEditBtn.onclick = () => resetForm();

function renderNotes(snapshot){
  const isAdmin = auth.currentUser && auth.currentUser.uid === ADMIN_UID;
  const entries = [];
  snapshot.forEach(child => { entries.push({ key: child.key, ...child.val() }); });
  entries.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

  notesList.innerHTML = '';
  if (entries.length === 0){
    notesList.innerHTML = '<div style="text-align:center;color:var(--ink-faint);padding:3.5rem;font-size:13.5px">還沒有心得記錄。</div>';
    return;
  }
  entries.forEach(e => {
    const entry = document.createElement('div');
    entry.className = 'note-entry';

    const meta = document.createElement('div');
    meta.className = 'note-meta';
    const dateSpan = document.createElement('span');
    dateSpan.textContent = e.date || '';
    meta.appendChild(dateSpan);

    if (isAdmin){
      const actions = document.createElement('div');
      actions.className = 'note-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'note-btn edit';
      editBtn.textContent = '編輯';
      editBtn.onclick = () => startEdit(e);
      actions.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'note-btn delete';
      delBtn.textContent = '刪除';
      delBtn.onclick = () => { if (confirm('確定刪除這篇心得？')) notesRef.child(e.key).remove(); };
      actions.appendChild(delBtn);

      meta.appendChild(actions);
    }
    entry.appendChild(meta);

    const textDiv = document.createElement('div');
    textDiv.className = 'note-text';
    textDiv.innerHTML = e.text || '';
    entry.appendChild(textDiv);

    notesList.appendChild(entry);
  });
}

notesRef.on('value', renderNotes);

loginBtn.onclick = () => { loginForm.style.display = 'flex'; };

loginForm.addEventListener('submit', (ev) => {
  ev.preventDefault();
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-pw').value;
  auth.signInWithEmailAndPassword(email, pw)
    .then(() => { loginForm.reset(); })
    .catch(err => alert('登入失敗：' + err.message));
});

logoutBtn.onclick = () => auth.signOut();

auth.onAuthStateChanged(user => {
  const isAdmin = user && user.uid === ADMIN_UID;
  loginForm.style.display = 'none';
  loginBtn.style.display = isAdmin ? 'none' : 'inline-block';
  logoutBtn.style.display = isAdmin ? 'inline-block' : 'none';
  addForm.style.display = isAdmin ? 'flex' : 'none';
  notesRef.once('value').then(renderNotes);
});

addForm.addEventListener('submit', (ev) => {
  ev.preventDefault();
  const dateVal = document.getElementById('note-date').value;
  const textVal = document.getElementById('note-text-input').value.trim();
  if (!dateVal || !textVal) return;

  if (editingKey){
    notesRef.child(editingKey).update({
      date: formatDate(dateVal),
      text: textVal.replace(/\n/g, '<br>')
    }).then(resetForm)
      .catch(err => alert('更新失敗：' + err.message));
  } else {
    notesRef.push({
      date: formatDate(dateVal),
      text: textVal.replace(/\n/g, '<br>'),
      timestamp: Date.now()
    }).then(resetForm)
      .catch(err => alert('發布失敗：' + err.message));
  }
});
</script>
</body>
</html>
